<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hope Rise Foundation | NGO</title>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,te,hi,ur,ta,ml,kn',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }

      // Aggressively hide Google Translate UI
      (function() {
        const style = document.createElement('style');
        style.innerHTML = `
          .goog-te-banner-frame, .goog-te-banner-frame.skiptranslate, [id=":0.container"], #goog-gt-tt, .goog-te-balloon-frame, .goog-tooltip, .goog-tooltip:hover {
            display: none !important;
            visibility: hidden !important;
          }
          body { top: 0 !important; }
          .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; border: none !important; }
        `;
        document.head.appendChild(style);

        // Periodically check and hide
        setInterval(function() {
          const banner = document.querySelector('.goog-te-banner-frame');
          if (banner) banner.style.display = 'none';
          if (document.body) document.body.style.top = '0px';
        }, 500);
      })();
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
